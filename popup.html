<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sitadel</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="logo">Sitadel</h1>
      <button id="options-btn" class="btn-manage">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="8" y1="6" x2="21" y2="6"/>
          <line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <circle cx="3" cy="6" r="0.5" fill="currentColor"/>
          <circle cx="3" cy="12" r="0.5" fill="currentColor"/>
          <circle cx="3" cy="18" r="0.5" fill="currentColor"/>
        </svg>
        Manage sites
      </button>
    </div>

    <div class="current-site">
      <span class="label">Current site</span>
      <span id="hostname" class="hostname">—</span>
    </div>

    <div class="action-group">
      <button id="save-btn" class="btn btn-save" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
        Save
      </button>
      <button id="block-btn" class="btn btn-block" disabled>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
        </svg>
        Block
      </button>
    </div>

    <div id="feedback" class="feedback hidden"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
