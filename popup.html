<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sitadel</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- kept for JS/test compatibility; visually hidden -->
  <span id="hostname" class="sr-only">—</span>

  <div class="container">
    <div class="header">
      <div class="logo">
        <img src="icons/icon48.png" width="22" height="22" class="logo-icon" alt="" />
        <span class="logo-text">Sitadel</span>
      </div>
      <button id="options-btn" class="btn-manage">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="8" y1="6" x2="21" y2="6"/>
          <line x1="8" y1="12" x2="21" y2="12"/>
          <line x1="8" y1="18" x2="21" y2="18"/>
          <circle cx="3" cy="6" r="1.5" fill="currentColor"/>
          <circle cx="3" cy="12" r="1.5" fill="currentColor"/>
          <circle cx="3" cy="18" r="1.5" fill="currentColor"/>
        </svg>
        Manage
      </button>
    </div>

    <div class="current-page">
      <div class="page-label">Current page</div>
      <div class="page-info">
        <div id="favicon-wrap" class="favicon-wrap">
          <img id="favicon" class="favicon" src="" alt="" />
        </div>
        <span id="page-title" class="page-title">—</span>
      </div>
    </div>

    <div class="action-group">
      <button id="save-btn" class="btn btn-save" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
        </svg>
        <span class="btn-label">Save</span>
      </button>
      <button id="block-btn" class="btn btn-block" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
        </svg>
        <span class="btn-label">Block</span>
      </button>
    </div>

    <div id="feedback" class="feedback hidden"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
