<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sitadel — Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="page">
    <header>
      <h1>Sitadel</h1>
      <p class="subtitle">Manage your blocked sites</p>
    </header>

    <section class="add-section">
      <label for="url-input">Add a site to block</label>
      <div class="input-row">
        <input
          id="url-input"
          type="text"
          placeholder="e.g. facebook.com or reddit.com/r/news"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="add-btn" class="btn btn-primary">Add</button>
      </div>
      <div id="add-error" class="error-msg hidden"></div>
    </section>

    <section class="settings-section">
      <h2>Settings</h2>
      <label class="toggle-row">
        <input type="checkbox" id="clear-history-toggle" />
        <span class="toggle-label">Remove blocked sites from browsing history</span>
      </label>
      <p class="toggle-hint">Prevents blocked site URLs from appearing in address bar suggestions.</p>
    </section>

    <section class="list-section">
      <h2>Blocked sites <span id="count" class="count">0</span></h2>
      <ul id="site-list" class="site-list">
        <li id="empty-state" class="empty-state">No sites blocked yet.</li>
      </ul>
    </section>
  </div>
  <script src="options.js"></script>
</body>
</html>
