<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Blocked</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      text-align: center;
      max-width: 440px;
      padding: 48px 40px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(229, 62, 62, 0.10);
    }

    .icon {
      font-size: 56px;
      margin-bottom: 20px;
      line-height: 1;
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      color: #e53e3e;
      margin-bottom: 10px;
    }

    .site-name {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      background: #fff0f0;
      display: inline-block;
      padding: 4px 14px;
      border-radius: 999px;
      margin-bottom: 20px;
      word-break: break-all;
    }

    p {
      font-size: 15px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: #e53e3e;
      color: #fff;
    }

    .btn-primary:hover { background: #c53030; }

    /* TO READ section */
    .toread-section {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #f0f0f0;
      text-align: left;
    }

    .toread-section h2 {
      font-size: 15px;
      font-weight: 700;
      color: #333;
      margin-bottom: 12px;
    }

    .toread-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toread-item .toread-title {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .toread-item .toread-meta {
      font-size: 12px;
      color: #999;
      margin-top: 2px;
    }

    .toread-overdue {
      display: inline-block;
      margin-top: 4px;
      font-size: 11px;
      font-weight: 600;
      color: #c05621;
      background: #feebc8;
      border-radius: 999px;
      padding: 1px 8px;
    }

    /* Open List */
    .btn-open-list {
      margin-top: 16px;
      background: #3182ce;
      color: #fff;
    }

    .btn-open-list:hover { background: #2b6cb0; }

    .open-list-picker {
      margin-top: 16px;
      background: #f8f9fb;
      border-radius: 10px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .open-list-picker[hidden] { display: none; }

    .open-list-choices {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .open-list-choices label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #222;
      cursor: pointer;
    }

    .open-list-confirm-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .open-list-cancel {
      border: none;
      background: none;
      color: #999;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: underline;
    }

    .open-list-cancel:hover { color: #555; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🚫</div>
    <h1>Site Blocked</h1>
    <div id="site-name" class="site-name"></div>
    <p>You added this site to your block list.<br>Stay focused — you've got this.</p>
    <div class="actions">
      <a id="options-link" class="btn btn-primary" href="#">Manage sites</a>
    </div>

    <div id="toread-section" class="toread-section" hidden>
      <h2>Your reading list</h2>
      <ul id="toread-list" class="toread-list"></ul>
      <div id="open-list-picker" class="open-list-picker" hidden></div>
      <button id="open-list-btn" class="btn btn-open-list">Open List</button>
    </div>
  </div>
  <script src="readlist-utils.js"></script>
  <script src="blocked.js"></script>
</body>
</html>
