<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Blocked</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fff5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      text-align: center;
      max-width: 440px;
      padding: 48px 40px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(229, 62, 62, 0.10);
    }

    .icon {
      font-size: 56px;
      margin-bottom: 20px;
      line-height: 1;
    }

    h1 {
      font-size: 26px;
      font-weight: 800;
      color: #e53e3e;
      margin-bottom: 10px;
    }

    .site-name {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      background: #fff0f0;
      display: inline-block;
      padding: 4px 14px;
      border-radius: 999px;
      margin-bottom: 20px;
      word-break: break-all;
    }

    p {
      font-size: 15px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: #e53e3e;
      color: #fff;
    }

    .btn-primary:hover { background: #c53030; }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover { background: #e0e0e0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🚫</div>
    <h1>Site Blocked</h1>
    <div id="site-name" class="site-name"></div>
    <p>You added this site to your block list.<br>Stay focused — you've got this.</p>
    <div class="actions">
      <button class="btn btn-secondary" onclick="history.back()">Go back</button>
      <a id="options-link" class="btn btn-primary" href="#">Manage block list</a>
    </div>
  </div>
  <script src="blocked.js"></script>
</body>
</html>
