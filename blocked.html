<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Site Blocked</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f7f7f8;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 96px 24px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .badge {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      border-radius: 18px;
      background: #fff0f0;
      color: #e5484d;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 14px rgba(229, 72, 77, 0.14);
    }

    h1 {
      font-size: 25px;
      font-weight: 800;
      letter-spacing: -0.4px;
    }

    .site-name {
      display: inline-block;
      margin: 12px 0 16px;
      padding: 4px 14px;
      border-radius: 999px;
      background: #fff;
      border: 1px solid #ececec;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      word-break: break-all;
    }

    p {
      font-size: 14px;
      color: #888;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .manage {
      display: inline-block;
      padding: 10px 22px;
      border-radius: 9px;
      background: #1a1a1a;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
    }

    .manage:hover { background: #000; }

    /* Reading list */
    .toread-section {
      margin-top: 34px;
      padding-top: 24px;
      border-top: 1px solid #ececec;
      text-align: left;
    }

    .toread-section h2 {
      font-size: 12px;
      font-weight: 700;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }

    .toread-list { list-style: none; }

    .toread-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 9px 0;
    }

    .favicon-wrap {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: #f0f0f2;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .favicon-wrap img { width: 20px; height: 20px; display: block; }

    .toread-text { flex: 1; min-width: 0; }

    .toread-title {
      font-size: 13.5px;
      font-weight: 600;
      color: #222;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .toread-meta {
      font-size: 11.5px;
      color: #aaa;
      margin-top: 2px;
    }

    .toread-chip {
      flex-shrink: 0;
      padding: 5px 10px;
      border: 1px solid #dbe4f0;
      border-radius: 999px;
      background: #f4f8fd;
      color: #3182ce;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .toread-chip.over {
      border-color: #f6d9b8;
      background: #feebc8;
      color: #c05621;
    }

    .open {
      margin-top: 16px;
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #47beff, #2676ff);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.15s;
    }

    .open:hover { filter: brightness(1.05); }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="9" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </div>
    <h1>Site blocked</h1>
    <div id="site-name" class="site-name"></div>
    <p>You added this site to your block list.<br>Stay focused — you've got this.</p>
    <a id="options-link" class="manage" href="#">Manage sites</a>

    <div id="toread-section" class="toread-section" hidden>
      <h2>Your reading list</h2>
      <ul id="toread-list" class="toread-list"></ul>
      <button id="open-list-btn" class="open">Open List</button>
    </div>
  </div>
  <script src="readlist-utils.js"></script>
  <script src="blocked.js"></script>
</body>
</html>
